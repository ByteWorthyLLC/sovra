<svg width="980" height="520" viewBox="0 0 980 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sovra platform architecture</title>
  <desc id="desc">Next.js web app connected to Supabase and Go worker, backed by PostgreSQL with pgvector.</desc>
  <defs>
    <linearGradient id="web" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E8FFF4" />
      <stop offset="1" stop-color="#E7F3FF" />
    </linearGradient>
    <linearGradient id="worker" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EAF3FF" />
      <stop offset="1" stop-color="#F4F8FF" />
    </linearGradient>
  </defs>

  <rect width="980" height="520" rx="18" fill="#F8FBFF" />

  <rect x="64" y="52" width="402" height="156" rx="16" fill="url(#web)" stroke="#CFE0F3" stroke-width="2" />
  <text x="92" y="102" font-family="Space Grotesk, Arial, sans-serif" font-size="32" font-weight="700" fill="#111318">Next.js Web App</text>
  <text x="92" y="137" font-family="Manrope, Arial, sans-serif" font-size="21" fill="#2A3344">App Router, API routes, UI layer</text>
  <text x="92" y="168" font-family="Manrope, Arial, sans-serif" font-size="21" fill="#2A3344">Tenant scoped requests and session auth</text>

  <rect x="514" y="52" width="402" height="156" rx="16" fill="url(#worker)" stroke="#CFE0F3" stroke-width="2" />
  <text x="542" y="102" font-family="Space Grotesk, Arial, sans-serif" font-size="32" font-weight="700" fill="#111318">Go Worker</text>
  <text x="542" y="137" font-family="Manrope, Arial, sans-serif" font-size="21" fill="#2A3344">MCP tool execution and orchestration</text>
  <text x="542" y="168" font-family="Manrope, Arial, sans-serif" font-size="21" fill="#2A3344">Socket.IO and gRPC services</text>

  <rect x="178" y="274" width="624" height="174" rx="16" fill="#FFFFFF" stroke="#CFE0F3" stroke-width="2" />
  <text x="206" y="326" font-family="Space Grotesk, Arial, sans-serif" font-size="32" font-weight="700" fill="#111318">Supabase + PostgreSQL + pgvector</text>
  <text x="206" y="360" font-family="Manrope, Arial, sans-serif" font-size="21" fill="#2A3344">Auth, row level security, tenant data isolation</text>
  <text x="206" y="392" font-family="Manrope, Arial, sans-serif" font-size="21" fill="#2A3344">Semantic retrieval and operational event storage</text>

  <path d="M290 208V274" stroke="#0F7A63" stroke-width="4" stroke-linecap="round" />
  <path d="M690 208V274" stroke="#0F7A63" stroke-width="4" stroke-linecap="round" />
  <path d="M466 130H514" stroke="#0F7A63" stroke-width="4" stroke-linecap="round" />

  <polygon points="282,270 290,284 298,270" fill="#0F7A63" />
  <polygon points="682,270 690,284 698,270" fill="#0F7A63" />
  <polygon points="510,122 524,130 510,138" fill="#0F7A63" />

  <text x="476" y="120" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#2A3344">gRPC / Socket</text>
  <text x="290" y="250" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#2A3344">SQL + RLS</text>
  <text x="690" y="250" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#2A3344">Tools + Memory</text>
</svg>
