name: ✨ Feature request
description: Suggest an idea or improvement.
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, consider starting a [Discussion](../discussions) — many feature ideas are better explored as conversations first.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the underlying problem, not the solution.
      placeholder: I'm always frustrated when [...]
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or examples about the feature request here.
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - "Nice to have"
        - "Would significantly improve my workflow"
        - "Blocking my work"
    validations:
      required: true
