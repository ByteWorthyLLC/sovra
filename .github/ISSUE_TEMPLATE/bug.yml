name: 🐛 Bug report
description: Report a bug to help us improve.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Before submitting, please search the [existing issues](../issues?q=is%3Aissue) to avoid duplicates.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I do X, Y happens. I expected Z.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered steps to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click '....'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Versions, OS, browser if applicable.
      value: |
        - OS:
        - Node version:
        - Package version:
        - Browser (if applicable):
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste any relevant log output, error messages, or screenshots.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://byteworthy.io/code-of-conduct).
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I agree to follow the Code of Conduct
          required: true
